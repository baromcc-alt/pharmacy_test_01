<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>온누리 약국 찾기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --brand: #FBB97D;
    --brand-dark: #F5A255;
    --brand-light: #FEF3E7;
    --text-primary: #1A1A1A;
    --text-secondary: #6B7280;
    --text-tertiary: #9CA3AF;
    --border: #F0F0F0;
    --bg: #FFFFFF;
    --bg-gray: #F8F8F8;
    --green: #10B981;
    --green-light: #ECFDF5;
  }
  html, body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #F0F0F0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  #app {
    width: 100%;
    max-width: 390px;
    background: var(--bg);
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── 헤더 ── */
  .header {
    background: #fff;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    flex-shrink: 0;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }
  .header-title span {
    color: var(--brand-dark);
  }
  .btn-share {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--brand-light);
    color: var(--brand-dark);
    border: none;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-share:active { transform: scale(0.96); }
  .btn-share svg { width: 15px; height: 15px; }

  /* ── 검색창 ── */
  .search-wrap {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    height: 42px;
    background: var(--bg-gray);
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 0 36px 0 38px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--brand); background: #fff; }
  .search-input::placeholder { color: var(--text-tertiary); }
  .search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--text-tertiary);
    border: none;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #fff;
    font-size: 11px;
    line-height: 1;
  }
  .search-clear.visible { display: flex; }

  /* ── 필터 ── */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .filter-select {
    flex: 1;
    height: 38px;
    background: var(--bg-gray);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0 10px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    outline: none;
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%239CA3AF' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
    padding-right: 26px;
    transition: border-color 0.2s;
  }
  .filter-select:focus { border-color: var(--brand); }
  .filter-select.active { border-color: var(--brand); background-color: var(--brand-light); color: var(--brand-dark); font-weight: 600; }

  /* ── 결과 카운트 ── */
  .result-bar {
    padding: 11px 20px;
    background: var(--bg-gray);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .result-count {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .result-count strong {
    color: var(--brand-dark);
    font-weight: 700;
  }
  .result-notice {
    font-size: 11px;
    color: var(--text-tertiary);
  }

  /* ── 리스트 ── */
  .list-container {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .list-container::-webkit-scrollbar { display: none; }

  .pharmacy-card {
    padding: 15px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .pharmacy-card:active { background: var(--bg-gray); }
  .pharmacy-card:last-child { border-bottom: none; }

  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--brand-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .card-icon svg { width: 20px; height: 20px; color: var(--brand-dark); }

  .card-body { flex: 1; min-width: 0; }
  .card-name-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 3px;
  }
  .card-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .badge-onnuri {
    flex-shrink: 0;
    background: var(--brand);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0;
  }
  .badge-doctornow {
    flex-shrink: 0;
    background: #EFF6FF;
    color: #3B82F6;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .card-region {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 3px;
  }
  .card-address {
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-arrow {
    color: var(--text-tertiary);
    flex-shrink: 0;
    margin-top: 10px;
  }

  /* ── 페이지네이션 ── */
  .pagination {
    padding: 16px 20px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    border-top: 1px solid var(--border);
  }
  .page-btn {
    min-width: 34px;
    height: 34px;
    border: 1.5px solid var(--border);
    background: #fff;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    padding: 0 8px;
  }
  .page-btn:hover { border-color: var(--brand); color: var(--brand-dark); }
  .page-btn.active { background: var(--brand); border-color: var(--brand); color: #fff; font-weight: 700; }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-btn:disabled:hover { border-color: var(--border); color: var(--text-secondary); }

  /* ── 빈 결과 ── */
  .empty-state {
    padding: 60px 20px;
    text-align: center;
  }
  .empty-state svg { width: 56px; height: 56px; color: var(--text-tertiary); margin-bottom: 14px; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
  .empty-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

  /* ── 상세 패널 ── */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .detail-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .detail-sheet {
    background: #fff;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 390px;
    padding: 0 0 32px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 85vh;
    overflow-y: auto;
  }
  .detail-sheet::-webkit-scrollbar { display: none; }
  .detail-overlay.open .detail-sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: #E5E7EB;
    border-radius: 2px;
    margin: 12px auto 20px;
  }
  .sheet-header {
    padding: 0 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sheet-badges {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .sheet-name {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }
  .sheet-region {
    font-size: 13px;
    color: var(--text-tertiary);
  }
  .sheet-body { padding: 20px; }
  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .info-row:last-of-type { border-bottom: none; }
  .info-icon {
    width: 36px;
    height: 36px;
    background: var(--bg-gray);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .info-icon svg { width: 18px; height: 18px; color: var(--brand-dark); }
  .info-label { font-size: 11px; color: var(--text-tertiary); margin-bottom: 2px; }
  .info-value { font-size: 14px; color: var(--text-primary); font-weight: 500; line-height: 1.4; }

  .sheet-actions { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
  .btn-action {
    width: 100%;
    height: 50px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
    text-decoration: none;
  }
  .btn-action:active { transform: scale(0.98); }
  .btn-naver {
    background: #03C75A;
    color: #fff;
  }
  .btn-doctornow {
    background: var(--brand);
    color: #fff;
  }
  .btn-secondary {
    background: var(--bg-gray);
    color: var(--text-primary);
    border: 1.5px solid var(--border);
  }

  /* ── 토스트 ── */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1A1A1A;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 11px 20px;
    border-radius: 10px;
    white-space: nowrap;
    opacity: 0;
    transition: all 0.25s;
    z-index: 999;
    font-family: 'Noto Sans KR', sans-serif;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>

      <div class="sheet-body" id="detailBody"></div>
      <div class="sheet-actions" id="detailActions"></div>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>
</div>

const pharmacies = RAW.pharmacies;
const sidoSigungu = RAW.sido_sigungu;

const PAGE_SIZE = 20;
let filtered = [];
let currentPage = 1;

// 초기화
function init() {
  // 시도 옵션
  const sidoSel = document.getElementById('sidoSelect');
  Object.keys(sidoSigungu).sort().forEach(sido => {
    const opt = document.createElement('option');
    opt.value = sido;
    opt.textContent = sido;
    sidoSel.appendChild(opt);
  });
  applyFilter();
}

function onSearchInput(el) {
  document.getElementById('searchClear').classList.toggle('visible', el.value.length > 0);
  currentPage = 1;
  applyFilter();
}

function clearSearch() {
  const inp = document.getElementById('searchInput');
  inp.value = '';
  document.getElementById('searchClear').classList.remove('visible');
  currentPage = 1;
  applyFilter();
}

function onSidoChange() {
  const sido = document.getElementById('sidoSelect').value;
  const sigunguSel = document.getElementById('sigunguSelect');
  sigunguSel.innerHTML = '<option value="">시/군/구 전체</option>';
  if (sido && sidoSigungu[sido]) {
    sidoSigungu[sido].forEach(sg => {
      const opt = document.createElement('option');
      opt.value = sg;
      opt.textContent = sg;
      sigunguSel.appendChild(opt);
    });
  }
  document.getElementById('sidoSelect').classList.toggle('active', !!sido);
  currentPage = 1;
  applyFilter();
}

function onFilterChange() {
  const sg = document.getElementById('sigunguSelect').value;
  document.getElementById('sigunguSelect').classList.toggle('active', !!sg);
  currentPage = 1;
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.trim();
  const sido = document.getElementById('sidoSelect').value;
  const sigungu = document.getElementById('sigunguSelect').value;

  filtered = pharmacies.filter(p => {
    if (sido && p.sido !== sido) return false;
    if (sigungu && p.sigungu !== sigungu) return false;
    if (q && !p.name.includes(q)) return false;
    return true;
  });

  document.getElementById('countDisplay').textContent = filtered.length.toLocaleString();
  renderList();
}

function renderList() {
  const container = document.getElementById('listContainer');
  const total = filtered.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = Math.max(1, totalPages);

  const start = (currentPage - 1) * PAGE_SIZE;
  const items = filtered.slice(start, start + PAGE_SIZE);

  if (items.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
        <div class="empty-title">검색 결과가 없어요</div>
        <div class="empty-desc">다른 키워드나 지역으로<br>다시 검색해 보세요</div>
      </div>`;
    return;
  }

  let html = '';
  items.forEach((p, i) => {
    const addrShort = p.address.length > 30 ? p.address.substring(0, 30) + '…' : p.address;
    const matchBadge = p.matched ? '<span class="badge-doctornow">닥터나우 제휴</span>' : '';
    html += `
      <div class="pharmacy-card" onclick="showDetail(${start + i})">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div class="card-body">
          <div class="card-name-row">
            <span class="card-name">${p.name}</span>
            <span class="badge-onnuri">온누리</span>
            ${matchBadge}
          </div>
          <div class="card-region">${p.sido} · ${p.sigungu}</div>
          <div class="card-address">${addrShort}</div>
        </div>
        <div class="card-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>`;
  });

  // 페이지네이션
  if (totalPages > 1) {
    html += '<div class="pagination">';
    // 이전
    html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>`;

    // 페이지 번호
    const pg = currentPage;
    const pages = [];
    if (totalPages <= 7) {
      for (let i = 1; i <= totalPages; i++) pages.push(i);
    } else {
      pages.push(1);
      if (pg > 4) pages.push('…');
      for (let i = Math.max(2, pg-2); i <= Math.min(totalPages-1, pg+2); i++) pages.push(i);
      if (pg < totalPages - 3) pages.push('…');
      pages.push(totalPages);
    }
    pages.forEach(p => {
      if (p === '…') {
        html += `<button class="page-btn" disabled style="border:none;background:none;color:var(--text-tertiary)">…</button>`;
      } else {
        html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
      }
    });

    // 다음
    html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>`;
    html += '</div>';
  }

  container.innerHTML = html;
  container.scrollTo(0, 0);
}

function goPage(page) {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderList();
}

// 상세 패널

  // 버튼
  const naverQuery = encodeURIComponent(p.name + ' ' + p.address);
  const naverUrl = `https://map.naver.com/p/search/${naverQuery}`;

  let actionsHtml = `
    <a href="${naverUrl}" target="_blank" class="btn-action btn-naver">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      네이버 지도에서 보기
    </a>`;

  if (p.matched && p.id) {
    actionsHtml += `
      <a href="doctornow://pharmacy/${p.id}" class="btn-action btn-doctornow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        닥터나우에서 처방받기
      </a>`;
  }

  actionsHtml += `
    <button class="btn-action btn-secondary" onclick="closeDetail()">
      닫기
    </button>`;
  document.getElementById('detailActions').innerHTML = actionsHtml;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail(e) {
  if (e && e.target !== document.getElementById('detailOverlay')) return;
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// 공유하기
async function handleShare() {
  const url = window.location.href;
  const title = '온누리 약국 찾기 — 전국 2,271개 온누리상품권 가맹 약국';
  if (navigator.share) {
    try {
      await navigator.share({ title, url });
    } catch(e) {}
  } else {
    try {
      await navigator.clipboard.writeText(url);
      showToast('🔗 링크가 복사되었어요');
    } catch(e) {
      showToast('링크 복사에 실패했어요');
    }
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
